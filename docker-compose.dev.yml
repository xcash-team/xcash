volumes:
  xcash_dev_django_db_data: {}
  xcash_dev_redis_data: {}
  xcash_dev_ethereum_data: {}
  xcash_dev_bitcoin_data: {}
  xcash_dev_signer_db_data: {}

services:
  django-db:
    image: postgres:18.3-trixie
    container_name: xcash_dev_django_db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - xcash_dev_django_db_data:/var/lib/postgresql

  redis:
    image: redis:8.2.1
    container_name: xcash_dev_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - xcash_dev_redis_data:/data

  flower:
    image: mher/flower:2.0
    container_name: xcash_dev_flower
    restart: unless-stopped
    depends_on:
       - redis
    environment:
      FLOWER_BROKER_URL: ${FLOWER_BROKER_URL:-redis://redis:6379/0}
      FLOWER_PORT: 5555
    ports:
      - "${FLOWER_PORT:-5555}:5555"
    command:
      - celery
      - --broker=${FLOWER_BROKER_URL:-redis://redis:6379/0}
      - flower
      - --port=5555

  ethereum:
    image: ghcr.io/foundry-rs/foundry:v1.3.1
    container_name: xcash_dev_ethereum
    # 开发环境直接以 root 运行，避免 Docker 命名卷根目录默认 755/root:root
    # 导致镜像内 foundry 用户无法把 anvil state 写入 /data。
    user: "0:0"
    restart: unless-stopped
    entrypoint: ["anvil"]
    ports:
      - "${LOCAL_EVM_PORT:-8545}:8545"
    volumes:
      - xcash_dev_ethereum_data:/data
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8545"
      - --chain-id
      - "${LOCAL_EVM_CHAIN_ID:-31337}"
      # 每秒自动出块，模拟真实链的区块推进，使 FULL 确认模式和 block_number_updated 正常工作。
      - --block-time
      - "${LOCAL_EVM_BLOCK_TIME:-1}"
      # 持久化链状态，重启后继续出块而非从创世块重来。
      - --state
      - /data/anvil-state.json
      # 开发联调更关注异常退出后的状态连续性，定时落盘比仅在退出时保存更稳妥。
      - --state-interval
      - "5"

  bitcoin:
    # 与生产环境统一使用 Bitcoin Core 官方镜像，减少环境差异。
    image: bitcoin/bitcoin:28
    container_name: xcash_dev_bitcoin
    restart: unless-stopped
    ports:
      - "${LOCAL_BTC_RPC_PORT:-18443}:18443"
    volumes:
      - xcash_dev_bitcoin_data:/root/.bitcoin
      - ./compose/dev/bitcoin/bitcoin.conf:/root/.bitcoin/bitcoin.conf:ro
      - ./compose/dev/bitcoin/start:/usr/local/bin/start-bitcoin:ro
    command: ["sh", "/usr/local/bin/start-bitcoin"]

  signer-db:
    image: postgres:18.3-trixie
    container_name: xcash_dev_signer_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${SIGNER_POSTGRES_DB:-xcash_signer}
      POSTGRES_USER: ${SIGNER_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${SIGNER_POSTGRES_PASSWORD:-postgres}
    ports:
      - "${SIGNER_POSTGRES_PORT:-5433}:5432"
    # signer 数据库必须独立持久化，避免与主应用数据库卷语义混淆。
    volumes:
      - xcash_dev_signer_db_data:/var/lib/postgresql

  signer:
    build:
      context: .
      dockerfile: ./signer/compose/dev/Dockerfile
    image: xcash_dev_signer
    container_name: xcash_dev_signer
    restart: unless-stopped
    depends_on:
      - signer-db
      - redis
    volumes:
      # signer 使用自己的虚拟环境卷，避免继续复用主应用 /app/.venv。
      - /app/signer/.venv
      # signer 开发容器只挂载 signer 项目自身代码，避免把整仓源码和宿主机 .venv 暴露进去。
      - ./signer:/app/signer:z
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      UV_PROJECT_ENVIRONMENT: /app/signer/.venv
      # 容器内通过服务名连接，覆盖 .env 中的 127.0.0.1
      POSTGRES_HOST: signer-db
      REDIS_HOST: redis
      SIGNER_POSTGRES_HOST: signer-db
      SIGNER_POSTGRES_PORT: 5432
    # 开发环境源码目录直接 bind mount 到 /app，宿主机文件权限会覆盖镜像内 chmod 结果。
    # 这里显式通过 bash 执行启动脚本，避免因宿主机未保留可执行位而启动失败。
    command: bash /app/signer/compose/dev/start
    ports:
      - "${SIGNER_PORT:-8010}:8000"
