name: xcash

volumes:
  redis_data: {}
  django_db_data: {}
  signer_db_data: {}

# 同机 SaaS 等可信服务通过加入 xcash_public 按容器名互通（如 http://xcash_traefik）。
# xcash 自己总是创建该网络；即便没有外部服务加入也不影响本项目正常运行。
networks:
  default:
  xcash_public:
    name: xcash_public

services:
  redis:
    image: redis:8.2.1
    container_name: xcash_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  django-db:
    image: postgres:18.3-trixie
    container_name: xcash_django_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: xcash
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - django_db_data:/var/lib/postgresql

  signer-db:
    image: postgres:18.3-trixie
    container_name: xcash_signer_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: xcash_signer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${SIGNER_POSTGRES_PASSWORD}
    volumes:
      - signer_db_data:/var/lib/postgresql

  signer:
    build:
      context: .
      dockerfile: ./signer/compose/production/Dockerfile
    container_name: xcash_signer
    restart: unless-stopped
    depends_on:
      - signer-db
      - redis
    env_file:
      - .env
    command: /start

  django: &django
    build:
      context: .
      dockerfile: ./compose/production/django/Dockerfile
    container_name: xcash_django
    restart: unless-stopped
    depends_on:
      - django-db
      - redis
      - signer
    env_file:
      - .env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gateway.rule=Host(`${SITE_DOMAIN}`)"
      - "traefik.http.routers.gateway.entrypoints=web"
      - "traefik.http.routers.gateway.service=gateway"
      - "traefik.http.routers.internal-api.rule=Path(`/internal/v1`) || PathPrefix(`/internal/v1/`)"
      - "traefik.http.routers.internal-api.entrypoints=web"
      - "traefik.http.routers.internal-api.service=gateway"
      - "traefik.http.services.gateway.loadbalancer.server.port=8000"
    command: /start

  worker:
    <<: *django
    container_name: xcash_worker
    labels: []
    environment:
      REMAP_SIGTERM: SIGQUIT
    stop_grace_period: 60s
    # worker 承担对 SaaS 的内部回调推送，需要能按容器名解析 saas 侧 traefik。
    networks: [default, xcash_public]
    command: /start-worker

  beat:
    <<: *django
    container_name: xcash_beat
    labels: []
    command: /start-beat

  traefik:
    image: traefik:v3.6.11
    container_name: xcash_traefik
    restart: unless-stopped
    depends_on:
      - django
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
    ports:
      - "${LISTEN_TO}:6688:80"
    # 对外（公网）走端口映射，对内（SaaS 同机调用）通过 xcash_public 网络按容器名直连。
    # container_name 里的下划线在 Django HTTP_HOST 校验（RFC 1034/1035）中非法，
    # 故在 xcash_public 上额外暴露一个合规的 DNS alias 供 SaaS 使用。
    networks:
      default: {}
      xcash_public:
        aliases:
          - xcash-traefik
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
