name: xcash

volumes:
  redis_data: {}
  django_db_data: {}
  signer_db_data: {}

services:
  redis:
    image: redis:8.2.1
    container_name: xcash_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  django-db:
    image: postgres:18.3-trixie
    container_name: xcash_django_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: xcash
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - django_db_data:/var/lib/postgresql

  signer-db:
    image: postgres:18.3-trixie
    container_name: xcash_signer_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: xcash_signer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${SIGNER_POSTGRES_PASSWORD}
    volumes:
      - signer_db_data:/var/lib/postgresql

  signer:
    build:
      context: .
      dockerfile: ./signer/compose/production/Dockerfile
    container_name: xcash_signer
    restart: unless-stopped
    depends_on:
      - signer-db
      - redis
    env_file:
      - .env
    command: /start

  django: &django
    build:
      context: .
      dockerfile: ./compose/production/django/Dockerfile
    container_name: xcash_django
    restart: unless-stopped
    depends_on:
      - django-db
      - redis
      - signer
    env_file:
      - .env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gateway.rule=Host(`${SITE_DOMAIN}`)"
      - "traefik.http.routers.gateway.entrypoints=web"
      - "traefik.http.routers.gateway.service=gateway"
      - "traefik.http.routers.internal-api.rule=Path(`/internal/v1`) || PathPrefix(`/internal/v1/`)"
      - "traefik.http.routers.internal-api.entrypoints=web"
      - "traefik.http.routers.internal-api.service=gateway"
      - "traefik.http.services.gateway.loadbalancer.server.port=8000"
    command: /start

  worker:
    <<: *django
    container_name: xcash_worker
    labels: []
    environment:
      REMAP_SIGTERM: SIGQUIT
    stop_grace_period: 60s
    command: /start-worker

  beat:
    <<: *django
    container_name: xcash_beat
    labels: []
    command: /start-beat

  traefik:
    image: traefik:v3.6.11
    container_name: xcash_traefik
    restart: unless-stopped
    depends_on:
      - django
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
    ports:
      - "${LISTEN_TO}:6688:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
